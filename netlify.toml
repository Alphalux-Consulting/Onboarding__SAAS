# Netlify Configuration for Alphalux Onboarding SAAS

[build]
command = "npm run build"
publish = "dist"

# Redirect all non-file requests to index.html (SPA routing)
[[redirects]]
from = "/*"
to = "/index.html"
status = 200

# Cache policy for static assets
[[headers]]
for = "/dist/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Don't cache HTML files (they might have changed)
[[headers]]
for = "*.html"
[headers.values]
Cache-Control = "public, max-age=0, must-revalidate"

